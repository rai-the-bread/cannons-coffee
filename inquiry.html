<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cannons Coffee - Inquiry</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <div class="wrapper">
        <header>
            <div class="logo">
                <img src="images/logo-nav.png" alt="Cannons Coffee, Beans of Joy! Est. 2014" />
                <h1>Cannons Coffee</h1>
            </div>
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="latte.html">Coffee</a></li>
                    <li><a href="https://www.cloveberry.com/" target="_blank">About</a></li>
                    <li><a href="mailto:raidorzback@gmail.com">Contact</a></li>
                    <li><a href="inquiry.html">Inquiry</a></li>
                    <li><a href="login.html">Login</a></li>
                </ul>
            </nav>
        </header>
        <main>
            <div class="hero" id="form-container">
                <h2>Order A Drink</h2>
                <form id="inquiry-form">
                    <div>
                        <label for="name">Name</label>
                        <input name="name" type="text" id="name" placeholder="Your Name" required>
                    </div>
                    <div>
                        <label for="email">Email</label>
                        <input name="email" type="email" id="email" placeholder="yourname@email.com" required>
                    </div>
                    <div>
                        <label for="phone">Phone #</label>
                        <input name="phone" type="tel" id="phone" placeholder="123-456-7890" required>
                    </div>
                    <div>
                        <label for="comments">Comments</label>
                        <textarea name="comments" id="comments" cols="30" rows="10"></textarea>
                    </div>
                    <div>
                        <label for="flavor">Coffee Flavor</label>
                        <select name="flavor" id="flavor">
                            <option value="">--Choose Flavor--</option>
                            <option value="hazelnut">Hazelnut</option>
                            <option value="caramel">Caramel</option>
                            <option value="mocha">Mocha</option>
                        </select>
                    </div>
                    <fieldset>
                        <legend>Are you purchasing coffee or seeking employment?</legend>
                        <label for="coffee">Buying Coffee</label>
                        <input type="radio" id="coffee" value="coffee" name="interest">
                        <label for="employment">Seeking Employment</label>
                        <input type="radio" id="employment" value="employment" name="interest">
                    </fieldset>
                    <button type="submit">Start Brewing!</button>
                </form>
                <div class="inquiry-message">
                    <p></p>
                </div>
                <button id="order-again" class="hidden">Order Again</button>
            </div>
        </main>
        <footer>
            <img src="images/logo-footer.png" alt="Cannons Coffee, Beans of Joy! Est. 2014">
            <p>&copy; 2026 Cannons Coffee. All Rights Reserved.</p>
        </footer>
    </div>
    <script src="js/custom-inquiry.js"></script>
</body>

</html>
