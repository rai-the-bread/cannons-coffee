<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cannons Coffee - Login</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <div class="wrapper">
        <header>
            <div class="logo">
                <img src="images/logo-nav.png" alt="Cannons Coffee, Beans of Joy! Est. 2014" />
                <h1>Cannons Coffee</h1>
            </div>
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="latte.html">Coffee</a></li>
                    <li><a href="https://www.cloveberry.com/" target="_blank">About</a></li>
                    <li><a href="mailto:raidorzback@gmail.com">Contact</a></li>
                    <li><a href="inquiry.html">Inquiry</a></li>
                    <li><a href="login.html">Login</a></li>
                </ul>
            </nav>
        </header>
        <main>
            <div class="hero" id="form-container">
                <h2>LOGIN</h2>
                <form id="login-form">
                    <div>
                        <label for="name">Name</label>
                        <input name="name" type="text" id="name" placeholder="Your Name" required>
                    </div>
                    <div>
                        <label for="email">Email</label>
                        <input name="email" type="email" id="email" placeholder="yourname@email.com" required>
                    </div>
                    <div>
                        <label for="password">Password</label>
                        <input name="password" type="password" id="password" required>
                    </div>
                    <button type="submit">Log In!</button>
                </form>
                <div class="login-message">
                    <p></p>
                </div>
                <button id="order-again" class="hidden">Order Again</button>
            </div>
        </main>
        <footer>
            <img src="images/logo-footer.png" alt="Cannons Coffee, Beans of Joy! Est. 2014">
            <p>&copy; 2026 Cannons Coffee. All Rights Reserved.</p>
        </footer>
    </div>
    <script src="js/custom-login.js"></script>
</body>

</html>
